version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talent-scout-backend
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - DATABASE_URL=sqlite:///./data/talent_scout.db
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
    networks:
      - talent-scout-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: node:18-alpine
    container_name: talent-scout-frontend
    working_dir: /app/frontend
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - talent-scout-network
    depends_on:
      - backend

networks:
  talent-scout-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
